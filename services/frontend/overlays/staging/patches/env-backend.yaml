apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      containers:
        - name: frontend
          env:
            - name: IAM_GRPC_HOST
              value: "iam-service"
            - name: IAM_GRPC_PORT
              value: "50052"
            - name: FINANCE_GRPC_HOST
              value: "finance-service"
            - name: FINANCE_GRPC_PORT
              value: "50051"
