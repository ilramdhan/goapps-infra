# Production: full resource budget (8c/16GB VPS) per spec §5.1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-cost-orchestrator
spec:
  template:
    spec:
      containers:
        - name: finance-cost-orchestrator
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
