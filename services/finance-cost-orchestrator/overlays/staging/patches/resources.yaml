# Staging: lower resource limits (4c/8GB VPS). Still a singleton.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-cost-orchestrator
spec:
  template:
    spec:
      containers:
        - name: finance-cost-orchestrator
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
