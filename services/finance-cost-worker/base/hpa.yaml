# Finance Cost Worker HPA — scales on RabbitMQ chunk queue depth.
# External metric `rabbitmq_queue_messages_ready{queue="finance.cost.chunk"}`
# is exposed by the RabbitMQ Prometheus plugin and surfaced to the HPA via
# prometheus-adapter (registered as an external metric). Target is an average
# value of 5 ready messages per replica.
# minReplicas/maxReplicas are patched per environment (staging 2->10, prod 2->50).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finance-cost-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finance-cost-worker
  minReplicas: 2
  maxReplicas: 50
  metrics:
    - type: External
      external:
        metric:
          name: rabbitmq_queue_messages_ready
          selector:
            matchLabels:
              queue: finance.cost.chunk
        target:
          type: AverageValue
          averageValue: "5"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
