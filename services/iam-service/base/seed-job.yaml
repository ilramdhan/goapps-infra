# IAM Seeder Job
# Seeds default roles, permissions, and admin user into the database.
#
# USAGE:
#   Staging: Run ONCE after the first deployment to populate initial data.
#     kubectl apply -f seed-job.yaml -n staging
#
#   To re-run (delete previous job first):
#     kubectl delete job iam-seed -n staging --ignore-not-found
#     kubectl apply -f seed-job.yaml -n staging
#
#   Monitor progress:
#     kubectl logs -f job/iam-seed -n staging
#
# PRODUCTION:
#   Same as staging — create the iam-seed-secret first, then apply.
#
# CUSTOM ADMIN CREDENTIALS (staging/production):
#   Create a secret BEFORE running this job:
#     kubectl create secret generic iam-seed-secret -n <namespace> \
#       --from-literal=SEED_ADMIN_USERNAME='admin' \
#       --from-literal=SEED_ADMIN_EMAIL='admin@yourdomain.com' \
#       --from-literal=SEED_ADMIN_PASSWORD='YourSecurePassword!'
#
#   If the secret does not exist (optional: true), the seeder falls back to:
#     - Username: admin
#     - Email: admin@goapps.local
#     - Password: random 24-char hex (printed to logs — save immediately!)
#
# WHAT IT SEEDS:
#   - Roles: SUPER_ADMIN, ADMIN, USER, VIEWER
#   - Permissions: IAM + Finance module permissions
#   - Admin user (credentials from iam-seed-secret or auto-generated)
#   - Role-permission assignments
#   - SUPER_ADMIN role assigned to admin user
#
# NOTE: The seeder uses ON CONFLICT DO NOTHING, so it is safe to run
#       multiple times without duplicating data.
#
apiVersion: batch/v1
kind: Job
metadata:
  name: iam-seed
  labels:
    app: iam-service
    component: seeder
    app.kubernetes.io/name: iam-service
    app.kubernetes.io/component: seeder
    app.kubernetes.io/part-of: goapps
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: iam-service
        component: seeder
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: Never
      containers:
        - name: iam-seeder
          image: ghcr.io/mutugading/iam-service:latest
          imagePullPolicy: Always
          command: ["go", "run", "./seeds/"]
          env:
            - name: APP_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Database config - same as IAM deployment
            - name: DATABASE_HOST
              value: "postgres.database.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "goapps"
            - name: DATABASE_SSLMODE
              value: "disable"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # --- Custom admin credentials (optional) ---
            # If iam-seed-secret does not exist, seeder uses defaults
            # (random password in staging/production, printed to logs).
            - name: SEED_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: iam-seed-secret
                  key: SEED_ADMIN_USERNAME
                  optional: true
            - name: SEED_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: iam-seed-secret
                  key: SEED_ADMIN_EMAIL
                  optional: true
            - name: SEED_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iam-seed-secret
                  key: SEED_ADMIN_PASSWORD
                  optional: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
