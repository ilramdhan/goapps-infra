# IAM Migration Job
# Runs database migrations using golang-migrate.
#
# USAGE:
#   Replace <namespace> with goapps-staging or goapps-production.
#
#   First run:
#     kubectl apply -f migrate-job.yaml -n <namespace>
#
#   Re-run (e.g., after adding new migrations):
#     kubectl delete job iam-migrate -n <namespace> --ignore-not-found
#     kubectl apply -f migrate-job.yaml -n <namespace>
#
#   Monitor progress:
#     kubectl logs -f job/iam-migrate -n <namespace>
#
# NOTE: Migrations use IF NOT EXISTS / IF EXISTS, safe to run multiple times.
#       Always run migrate BEFORE seed.
#
apiVersion: batch/v1
kind: Job
metadata:
  name: iam-migrate
  labels:
    app: iam-service
    component: migration
    app.kubernetes.io/name: iam-service
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: goapps
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: iam-service
        component: migration
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      restartPolicy: Never
      containers:
        - name: iam-migrate
          image: ghcr.io/mutugading/iam-service:d37a89e
          imagePullPolicy: Always
          command:
            - /app/migrate
            - -path
            - /app/migrations
            - -database
            - $(DATABASE_URL)
            - up
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@postgres.database.svc.cluster.local:5432/goapps?sslmode=disable"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
