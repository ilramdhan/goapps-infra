# Finance Worker Deployment
# Consumes RabbitMQ messages and runs Oracle-to-PostgreSQL sync jobs.
# Uses the same Docker image as finance-service with a different entrypoint.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-worker
  labels:
    app: finance-worker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: finance-worker
  template:
    metadata:
      labels:
        app: finance-worker
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: finance-worker
          image: ghcr.io/mutugading/finance-service:latest
          command: ["/app/finance-worker"]
          imagePullPolicy: Always
          env:
            - name: APP_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Database config (via PgBouncer)
            - name: DATABASE_HOST
              value: "pgbouncer.database.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "goapps"
            - name: DATABASE_SSLMODE
              value: "disable"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # Oracle config
            - name: ORACLE_HOST
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_HOST
            - name: ORACLE_PORT
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_PORT
            - name: ORACLE_SERVICE
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_SERVICE
            - name: ORACLE_USER
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_USER
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_PASSWORD
            # RabbitMQ config (constructed from secret user/password + service DNS)
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq.database.svc.cluster.local:5672/"
            # Tracing
            - name: TRACING_ENABLED
              value: "true"
            - name: JAEGER_ENDPOINT
              value: "jaeger-collector.observability.svc.cluster.local:4317"
            # IAM gRPC client — worker → IAM for EXPORT_READY notifications.
            - name: IAM_GRPC_HOST
              value: "iam-service.goapps-staging.svc.cluster.local"  # overridden per env via kustomize
            - name: IAM_GRPC_PORT
              value: "50052"
            # MinIO storage — worker uploads RM Cost xlsx exports here.
            - name: MINIO_ENDPOINT
              value: "minio.minio.svc.cluster.local:9000"
            - name: MINIO_BUCKET
              value: "goapps-staging"    # overridden per environment via kustomize
            - name: MINIO_USE_SSL
              value: "true"
            - name: MINIO_INSECURE_SKIP_VERIFY
              value: "true"              # self-signed certs in cluster
            - name: MINIO_PUBLIC_URL
              value: ""                  # overridden per environment via kustomize
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            # Internal service-to-service token — sent in `x-internal-token`
            # gRPC metadata when calling IAM CreateNotification. Must match the
            # value mounted on iam-service.
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: goapps-internal-token
                  key: INTERNAL_SERVICE_TOKEN
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              # 1Gi headroom for the v2 ETL bulk import. The import streams the
              # uploaded file into staging via COPY (no full-file buffering), so
              # real usage stays low; 1Gi is comfortable on the constrained nodes.
              memory: "1Gi"
              cpu: "500m"
          # Worker has no ports — use exec-based liveness probe
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f finance-worker"
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f finance-worker"
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
