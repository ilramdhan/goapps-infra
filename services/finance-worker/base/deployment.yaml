# Finance Worker Deployment
# Consumes RabbitMQ messages and runs Oracle-to-PostgreSQL sync jobs.
# Uses the same Docker image as finance-service with a different entrypoint.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-worker
  labels:
    app: finance-worker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: finance-worker
  template:
    metadata:
      labels:
        app: finance-worker
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: finance-worker
          image: ghcr.io/mutugading/finance-service:latest
          command: ["/app/finance-worker"]
          imagePullPolicy: Always
          env:
            - name: APP_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Database config (via PgBouncer)
            - name: DATABASE_HOST
              value: "pgbouncer.database.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "goapps"
            - name: DATABASE_SSLMODE
              value: "disable"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # Oracle config
            - name: ORACLE_HOST
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_HOST
            - name: ORACLE_PORT
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_PORT
            - name: ORACLE_SERVICE
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_SERVICE
            - name: ORACLE_MGTDAT_USER
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_MGTDAT_USER
            - name: ORACLE_MGTDAT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_MGTDAT_PASSWORD
            # RabbitMQ config (constructed from secret user/password + service DNS)
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq.database.svc.cluster.local:5672/"
            # Tracing
            - name: TRACING_ENABLED
              value: "true"
            - name: JAEGER_ENDPOINT
              value: "jaeger-collector.observability.svc.cluster.local:4317"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Worker has no ports — use exec-based liveness probe
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f finance-worker"
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f finance-worker"
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
