# Staging: Lower resource limits for worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-worker
spec:
  template:
    spec:
      containers:
        - name: finance-worker
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
