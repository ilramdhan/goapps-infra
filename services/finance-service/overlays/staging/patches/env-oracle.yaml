# Oracle credentials for BI ETL (staging uses oracle-rnd endpoint)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
spec:
  template:
    spec:
      containers:
        - name: finance-service
          env:
            - name: ORACLE_HOST
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_HOST
            - name: ORACLE_PORT
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_PORT
            - name: ORACLE_SERVICE
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_SERVICE
            - name: ORACLE_USER
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_USER
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_PASSWORD
