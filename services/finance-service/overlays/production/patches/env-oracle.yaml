# Oracle credentials for BI ETL — finance-service connects to Oracle MV directly
# to load MV_DASH_MIS_MGT / MV_DASH_DELMAR_MGT / MV_DASH_SALES_MGT into bi_fact_metric.
# Secret oracle-credentials is shared with finance-worker (already applied to cluster).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
spec:
  template:
    spec:
      containers:
        - name: finance-service
          env:
            - name: ORACLE_HOST
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_HOST
            - name: ORACLE_PORT
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_PORT
            - name: ORACLE_SERVICE
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_SERVICE
            - name: ORACLE_USER
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_USER
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-credentials
                  key: ORACLE_PASSWORD
