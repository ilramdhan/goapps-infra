# Finance Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  labels:
    app: finance-service
spec:
  replicas: 1
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # Never kill old pod before new one is ready
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: finance-service
          image: ghcr.io/mutugading/finance-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8080
              name: http
            - containerPort: 8090
              name: metrics
          env:
            - name: APP_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Database config - matches Go app config.go bindings
            - name: DATABASE_HOST
              value: "postgres.database.svc.cluster.local"
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: "goapps"
            - name: DATABASE_SSLMODE
              value: "disable"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # JWT (shared secret with IAM for token validation)
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: goapps-auth-secret
                  key: JWT_ACCESS_SECRET
            # CORS (comma-separated origins for SSO multi-app)
            - name: CORS_ALLOWED_ORIGINS
              value: "https://app.goapps.local"
            # Redis config (UOM cache)
            - name: REDIS_HOST
              value: "redis.database.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            # Auth Redis (shared with IAM for token blacklist)
            - name: AUTH_REDIS_HOST
              value: "redis.database.svc.cluster.local"
            - name: AUTH_REDIS_PORT
              value: "6379"
            - name: AUTH_REDIS_DB
              value: "1"
            # RabbitMQ (for Oracle sync job publishing)
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq.database.svc.cluster.local:5672/"
            # Tracing
            - name: TRACING_ENABLED
              value: "true"
            - name: JAEGER_ENDPOINT
              value: "jaeger-collector.observability.svc.cluster.local:4317"
            # MinIO storage — used by GetExportDownloadURL to issue presigned
            # download URLs for rm_cost_export artifacts. The presign client
            # MUST be built against the same public endpoint browsers will
            # reach because AWS SigV4 binds the signature to the Host header.
            - name: MINIO_ENDPOINT
              value: "minio.minio.svc.cluster.local:9000"
            - name: MINIO_BUCKET
              value: "goapps-staging"    # overridden per environment via kustomize
            - name: MINIO_USE_SSL
              value: "true"
            - name: MINIO_INSECURE_SKIP_VERIFY
              value: "true"              # self-signed certs in cluster
            - name: MINIO_PUBLIC_URL
              value: ""                  # overridden per environment via kustomize
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12    # 5 + (5*12) = 65s max startup time
          livenessProbe:
            grpc:
              port: 50051
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50051
            periodSeconds: 5
            failureThreshold: 3
