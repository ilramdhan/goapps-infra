# ArgoCD Application - Infrastructure Database
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-database
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: goapps
  source:
    repoURL: https://github.com/mutugading/goapps-infra.git
    targetRevision: main
    path: base/database
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
# NOTE: infra-backup Application has been moved to environment-specific files:
# - argocd/apps/staging/infra-backup.yaml (uses overlays/staging/backup)
# - argocd/apps/production/infra-backup.yaml (uses overlays/production/backup)
