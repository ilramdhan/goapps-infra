# ArgoCD Application - Finance Cost Orchestrator Staging
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: finance-cost-orchestrator-staging
  namespace: argocd
  annotations:
    # ArgoCD Image Updater configuration
    argocd-image-updater.argoproj.io/image-list: orchestrator=ghcr.io/mutugading/finance-cost-orchestrator
    argocd-image-updater.argoproj.io/orchestrator.update-strategy: newest-build
    argocd-image-updater.argoproj.io/orchestrator.allow-tags: regexp:^[a-f0-9]{7,40}$
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
    argocd-image-updater.argoproj.io/write-back-target: kustomization
    argocd-image-updater.argoproj.io/git-branch: main
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: goapps
  source:
    repoURL: https://github.com/mutugading/goapps-infra.git
    targetRevision: main
    path: services/finance-cost-orchestrator/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: goapps-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
