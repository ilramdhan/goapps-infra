# Helm values for prometheus-community/prometheus-adapter.
#
# Registers the External Metrics API (external.metrics.k8s.io) so the
# finance-cost-worker HPA can scale on the RabbitMQ queue depth metric
# `rabbitmq_queue_messages_ready`. Without this, the worker HPA stays pinned at
# minReplicas and a 12k calc batch drains on 2 workers (~6-8 min on staging).
#
# Install (added to scripts/install-monitoring.sh as Step 4):
#   helm upgrade --install prometheus-adapter prometheus-community/prometheus-adapter \
#     -n monitoring -f base/monitoring/helm-values/prometheus-adapter.yaml
#
# Verify after install:
#   kubectl get apiservice v1beta1.external.metrics.k8s.io      # → Available: True
#   kubectl get --raw "/apis/external.metrics.k8s.io/v1beta1/namespaces/goapps-staging/rabbitmq_queue_messages_ready"

# Point the adapter at the kube-prometheus-stack Prometheus service.
prometheus:
  url: http://prometheus-kube-prometheus-prometheus.monitoring.svc
  port: 9090

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Only external rules are needed — HPA reads the queue depth as an external
# metric (it is not tied to a pod/container resource).
rules:
  default: false
  external:
    - seriesQuery: 'rabbitmq_queue_messages_ready{queue="finance.cost.chunk"}'
      resources:
        overrides:
          namespace:
            resource: namespace
      name:
        as: "rabbitmq_queue_messages_ready"
      metricsQuery: 'sum(rabbitmq_queue_messages_ready{queue="finance.cost.chunk"}) by (namespace)'
