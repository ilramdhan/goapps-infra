# ============================================================================
# Helm values for kube-prometheus-stack
# WITH PERSISTENCE + DASHBOARD/ALERT PROVISIONING
# ============================================================================
#
# Apply with:
# helm upgrade prometheus prometheus-community/kube-prometheus-stack \
#   -f prometheus-stack.yaml \
#   --set grafana.adminPassword="YOUR_PASSWORD" \
#   --set grafana.assertNoLeakedSecrets=false \
#   -n monitoring
#
# ============================================================================

grafana:
  # ========================================
  # PERSISTENCE - Data tidak hilang saat restart
  # ========================================
  persistence:
    enabled: true
    type: pvc
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  # ========================================
  # Fix init-chown-data permission denied on PVC
  # https://github.com/grafana/helm-charts/issues/1256
  # ========================================
  initChownData:
    enabled: false
  
  # Run as Grafana user (UID 472)
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  # ========================================
  # Sub-path configuration for /grafana
  # ========================================
  "grafana.ini":
    server:
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true
    smtp:
      enabled: true
      host: mail.mutugading.com:465
      user: mgtalert@mutugading.com
      # Password from secret (see envValueFrom below)
      from_address: mgtalert@mutugading.com
      from_name: "GoApps Monitoring"
      # For SSL on port 465
      skip_verify: false
      startTLS_policy: NoStartTLS

  # Load SMTP password from Kubernetes Secret
  envValueFrom:
    GF_SMTP_PASSWORD:
      secretKeyRef:
        name: grafana-smtp-secret
        key: password

  # ========================================
  # Dashboard Provisioning via ConfigMaps
  # ========================================
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      searchNamespace: monitoring
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: monitoring
      defaultDatasourceEnabled: false
    alerts:
      enabled: true
      label: grafana_alert
      labelValue: "1"
      searchNamespace: monitoring

  # ========================================
  # Datasources (managed here, NOT via external ConfigMaps)
  # defaultDatasourceEnabled: false above prevents helm from creating
  # a duplicate Prometheus datasource ConfigMap
  # ========================================
  additionalDataSources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://prometheus-kube-prometheus-prometheus:9090
      access: proxy
      isDefault: false
      editable: false
    - name: Loki
      type: loki
      uid: loki
      url: http://loki:3100
      access: proxy
      isDefault: false
      editable: false
      jsonData:
        maxLines: 1000

# ========================================
# Prometheus Configuration
# ========================================
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "15GB"     # Hard limit: auto-delete oldest data if storage exceeds 15GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    
    # Sub-path configuration
    externalUrl: "/prometheus"
    routePrefix: "/prometheus"
    
    # Auto-discover all ServiceMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# ========================================
# Alertmanager Configuration
# ========================================
alertmanager:
  alertmanagerSpec:
    externalUrl: "https://goapps.mutugading.com/alertmanager"
    routePrefix: "/alertmanager"

# ========================================
# Kubelet / cAdvisor Configuration for K3s
# Required for container_cpu_usage_seconds_total,
# container_memory_usage_bytes metrics
# ========================================
kubelet:
  enabled: true
  serviceMonitor:
    # K3s uses different endpoint configurations
    https: true
    cAdvisor: true
    probes: true
    resource: true
    # Relabeling to work with K3s
    cAdvisorRelabelings:
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
    relabelings:
      - sourceLabels: [__metrics_path__]
        targetLabel: metrics_path

# ========================================
# Disable K3s-incompatible components
# K3s runs control plane as single binary
# ========================================
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
