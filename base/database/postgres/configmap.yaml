apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: database
  labels:
    app: postgres
data:
  # PostgreSQL configuration tuning
  # Tuned for: 100 users, costing batch (12K products × 500 params), daily valuations
  # Memory budget: 2Gi container limit → 512MB shared_buffers (25%)
  postgresql.conf: |
    # Connection Settings
    # max_connections raised to 200 for Phase C calc engine — finance-cost-worker
    # fans out to many pods, all routed through PgBouncer (MAX_DB_CONNECTIONS=80).
    listen_addresses = '*'
    max_connections = 200

    # Memory Settings
    # NOTE: base values stay conservative because the staging postgres pod runs
    # on a 4c/8GB VPS with a ~2Gi container limit. The full Phase C §6 tuning
    # (shared_buffers=2GB, effective_cache_size=6GB) is only safe once the
    # postgres container limit is raised on production (8c/16GB). Bump these in a
    # production-only overlay when the limit is increased.
    shared_buffers = 1GB
    effective_cache_size = 3GB
    work_mem = 16MB
    maintenance_work_mem = 512MB
    temp_buffers = 16MB

    # WAL Settings
    wal_buffers = 16MB
    checkpoint_completion_target = 0.9
    min_wal_size = 256MB
    max_wal_size = 1GB

    # Parallel Query (critical for costing batch operations)
    max_worker_processes = 8
    max_parallel_workers = 8
    max_parallel_workers_per_gather = 4
    max_parallel_maintenance_workers = 2

    # Autovacuum — tightened for the high-churn cost_* tables written during
    # large calc batches (12K products x 500 params per job).
    autovacuum_max_workers = 4
    autovacuum_vacuum_scale_factor = 0.05

    # Query Planner
    random_page_cost = 1.1
    effective_io_concurrency = 200

    # Logging
    log_timezone = 'Asia/Jakarta'
    log_statement = 'ddl'
    log_min_duration_statement = 1000

    # Locale
    timezone = 'Asia/Jakarta'
    datestyle = 'iso, mdy'
    lc_messages = 'en_US.utf8'
    lc_monetary = 'en_US.utf8'
    lc_numeric = 'en_US.utf8'
    lc_time = 'en_US.utf8'
    default_text_search_config = 'pg_catalog.english'

  # Schema initialization script
  init-schemas.sql: |
    -- Create schemas for microservices
    CREATE SCHEMA IF NOT EXISTS export;
    CREATE SCHEMA IF NOT EXISTS auth;
    CREATE SCHEMA IF NOT EXISTS hr;
    CREATE SCHEMA IF NOT EXISTS finance;
    
    -- Grant usage to postgres user (default)
    GRANT ALL PRIVILEGES ON SCHEMA export TO postgres;
    GRANT ALL PRIVILEGES ON SCHEMA auth TO postgres;
    GRANT ALL PRIVILEGES ON SCHEMA hr TO postgres;
    GRANT ALL PRIVILEGES ON SCHEMA finance TO postgres;
    
    -- For future service-specific users:
    -- CREATE USER export_user WITH PASSWORD 'xxx';
    -- GRANT USAGE ON SCHEMA export TO export_user;
    -- GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA export TO export_user;
    -- ALTER DEFAULT PRIVILEGES IN SCHEMA export GRANT ALL ON TABLES TO export_user;
    
    -- Log successful initialization
    DO $$
    BEGIN
      RAISE NOTICE 'Schemas initialized: export, auth, hr, finance';
    END $$;
