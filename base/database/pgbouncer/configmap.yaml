apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: database
data:
  # Tuned for Phase C calc engine: finance-cost-worker scales to many pods
  # (staging 10, prod 50), each holding a short-lived transaction-pooled
  # connection. Single shared `goapps` database (K8s uses one DB, not the
  # per-service finance_db/iam_db split that docker-compose uses), so the
  # pool is sized at the cluster level via these env vars rather than a
  # per-database [databases] block.
  POOL_MODE: "transaction"
  MAX_CLIENT_CONN: "2000"
  DEFAULT_POOL_SIZE: "25"
  MIN_POOL_SIZE: "5"
  RESERVE_POOL_SIZE: "5"
  # Hard ceiling of server-side connections PgBouncer will open to PostgreSQL.
  # Kept below postgres max_connections to leave headroom for direct admin/
  # exporter connections.
  MAX_DB_CONNECTIONS: "80"
  SERVER_RESET_QUERY: "DISCARD ALL"
  LOG_CONNECTIONS: "1"
  LOG_DISCONNECTIONS: "1"
  STATS_PERIOD: "60"
  AUTH_TYPE: "scram-sha-256"
