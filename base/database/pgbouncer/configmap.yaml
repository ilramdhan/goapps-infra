apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: database
data:
  POOL_MODE: "transaction"
  MAX_CLIENT_CONN: "200"
  DEFAULT_POOL_SIZE: "30"
  MIN_POOL_SIZE: "5"
  RESERVE_POOL_SIZE: "10"
  SERVER_RESET_QUERY: "DISCARD ALL"
  LOG_CONNECTIONS: "1"
  LOG_DISCONNECTIONS: "1"
  STATS_PERIOD: "60"
  AUTH_TYPE: "scram-sha-256"
